name: Chronis HW-Track-3 CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check hw-track-3-connectivity/ --ignore E501,E402

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov fastapi httpx uvicorn cryptography pydantic
      - name: Run full test suite
        working-directory: hw-track-3-connectivity
        run: |
          pytest \
            storage/tests/ \
            provisioning/tests/ \
            ota/tests/ \
            ble/tests/ \
            orchestration/tests/ \
            cli/tests/ \
            cloud/tests/ \
            e2e/ \
            -v --tb=short
        env:
          PYTHONPATH: .
